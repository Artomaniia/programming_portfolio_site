site_name: Работы по программированию
site_url: https://artomaniia.github.io/programming_portfolio_site/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Перейти на светлую сторону

    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Принять тёмные силы
  language: ru

nav:
  - Главная: index.md
  - Работа 1 (two summ): programming/work1.md
  - Работа 2 (calculate): programming/work2.md
  - Работа 3 (бИнарное дерево): programming/work3.md
  - Работа 4 (Тг Боть): programming/work4.md
  - Работа 5: programming/work5.md
  - Работа 6: programming/work6.md
  - Работа 7: programming/work7.md
  - Работа 8: programming/work8.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
